<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu — Pelvec</title>
  <link rel="icon" href="img/minlogo.png" type="image/png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ── Variables ─────────────────────────────────────────── */
    :root {
      --bg:          #0f0e0c;
      --bg-2:        #161412;
      --bg-3:        #1e1c19;
      --gold:        #cfa549;
      --gold-light:  #e8c47a;
      --gold-dim:    rgba(207, 165, 73, 0.10);
      --gold-border: rgba(207, 165, 73, 0.22);
      --text:        #f0ebe2;
      --text-muted:  #8a8278;
      --text-dim:    #55504a;
      --radius:      4px;
      --ease:        cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      min-height: 100vh;
    }

    a { color: var(--gold); text-decoration: none; }
    a:hover { color: var(--gold-light); }

    /* ── Header ────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 14, 12, 0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--gold-border);
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 16px;
    }

    .back-link {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.25s var(--ease);
      white-space: nowrap;
    }
    .back-link:hover { color: var(--gold); }
    .back-link::before { content: '←'; font-size: 14px; }

    .header-logo {
      font-family: 'Alex Brush', cursive;
      font-size: 32px;
      color: var(--gold);
      line-height: 1;
      flex: 1;
      text-align: center;
    }
    .header-logo:hover { color: var(--gold-light); }

    .lang-btn {
      background: transparent;
      border: 1px solid var(--gold-border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.25s var(--ease);
    }
    .lang-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Page title ─────────────────────────────────────────── */
    #menu-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 400;
      color: var(--text);
      text-align: center;
      padding: 48px 24px 8px;
      letter-spacing: 1px;
    }

    .menu-subtitle {
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      padding-bottom: 40px;
    }

    /* ── Menu container ─────────────────────────────────────── */
    #menu {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /* ── Category group ─────────────────────────────────────── */
    .menu-group {
      border: 1px solid var(--gold-border);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color 0.25s var(--ease);
    }
    .menu-group:hover { border-color: rgba(207, 165, 73, 0.4); }

    /* ── Category header (clickable) ────────────────────────── */
    .menu-title-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      cursor: pointer;
      user-select: none;
      background: var(--bg-2);
      transition: background 0.25s var(--ease);
      gap: 16px;
    }
    .menu-title-line:hover { background: var(--bg-3); }

    .menu-title-line h2 {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0;
    }

    .chevron {
      font-size: 18px;
      color: var(--text-dim);
      transition: transform 0.3s var(--ease);
      line-height: 1;
    }
    .menu-group.open .chevron { transform: rotate(180deg); }

    /* ── Items grid ─────────────────────────────────────────── */
    .menu-items {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1px;
      background: var(--gold-border);
    }
    .menu-group.open .menu-items { display: grid; }

    .menu-card {
      background: var(--bg);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: background 0.2s var(--ease);
    }
    .menu-card:hover { background: var(--bg-2); }

    .menu-card span:first-child {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .price {
      font-size: 13px;
      font-weight: 600;
      color: var(--gold);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Language modal ─────────────────────────────────────── */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(10, 9, 8, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .modal.hidden { display: none; }

    .modal-content {
      background: var(--bg-2);
      border: 1px solid var(--gold-border);
      border-radius: 8px;
      padding: 48px 40px;
      text-align: center;
      max-width: 340px;
      width: 90%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    .modal-logo {
      font-family: 'Alex Brush', cursive;
      font-size: 56px;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 12px;
    }

    .modal-content h2 {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 28px;
    }

    .modal-content button {
      display: block;
      width: 100%;
      padding: 13px 24px;
      margin-bottom: 10px;
      background: transparent;
      border: 1px solid var(--gold-border);
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.25s var(--ease);
    }
    .modal-content button:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg);
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .back-link span { display: none; }

      #menu-title { padding-top: 36px; }

      .menu-title-line { padding: 16px 18px; }

      .menu-items { grid-template-columns: 1fr; }

      .menu-card { padding: 14px 18px; }

      .modal-content { padding: 36px 24px; }
    }
  </style>
</head>

      <button onclick="chooseLanguage('en')">English</button>
      <button onclick="chooseLanguage('mk')">Македонски</button>
    </div>
  </div>

    function chooseLanguage(lang) {
      currentLanguage = lang;
      document.getElementById('languageModal').classList.add('hidden');
      renderMenu();
    }

    function toggleCategory(section) {
      section.classList.toggle('open');
    }

    function renderMenu() {
      const container = document.getElementById('menu');
      const title     = document.getElementById('menu-title');

      container.innerHTML = '';
      title.textContent = menuData[currentLanguage].title;

      menuData[currentLanguage].categories.forEach((category, index) => {
        const section = document.createElement('section');
        section.className = 'menu-group';
        if (index === 0) section.classList.add('open');

        const titleLine = document.createElement('div');
        titleLine.className = 'menu-title-line';
        titleLine.onclick = () => toggleCategory(section);

        const h2 = document.createElement('h2');
        h2.textContent = category.name;

        const chevron = document.createElement('span');
        chevron.className = 'chevron';
        chevron.innerHTML = '&#9662;';

        titleLine.appendChild(h2);
        titleLine.appendChild(chevron);

        const items = document.createElement('div');
        items.className = 'menu-items';

        category.items.forEach(item => {
          const card = document.createElement('div');
          card.className = 'menu-card';
          card.innerHTML = `
            <span>${item.name}</span>
            <span class="price">${item.price}</span>
          `;
          items.appendChild(card);
        });

        section.appendChild(titleLine);
        section.appendChild(items);
        container.appendChild(section);
      });
    }

    loadMenu();
  </script>

</body>
</html>
